<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Controle de Atribuições</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
    margin:0;
    padding:30px;
    font-family:Segoe UI;
    background:#0f172a;
    color:white;
}

.container{
    max-width:1400px;
    margin:auto;
}

h1{
    text-align:center;
}

.uploads{
    display:flex;
    gap:20px;
    margin:30px 0;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    flex:1;
}

input{
    width:100%;
}

button{
    background:#3b82f6;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    background:#1e293b;
}

td,th{
    padding:12px;
    border:1px solid #334155;
}

</style>
</head>

<body>

<div class="container">

<h1>Controle de Atribuições</h1>

<div class="uploads">

<div class="card">
<h3>Base Atribuir Locais</h3>
<input type="file" id="base1">
</div>

<div class="card">
<h3>Base Usuários</h3>
<input type="file" id="base2">
</div>

</div>

<button onclick="processar()">
Processar Arquivos
</button>

<table id="resultado">

<thead>
<tr>
<th>ID Usuário</th>
<th>Nome</th>
<th>Turno</th>
<th>Qtd Lotes</th>
<th>Lotes</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script>

let atribuirLocais = [];
let usuarios = [];

document.getElementById('base1')
.addEventListener('change', e => {
lerExcel(e.target.files[0], dados=>{
atribuirLocais=dados;
});
});

document.getElementById('base2')
.addEventListener('change', e => {
lerExcel(e.target.files[0], dados=>{
usuarios=dados;
}, "DATA");
});

function lerExcel(file, callback, aba=null){

const reader = new FileReader();

reader.onload = function(e){

const data = new Uint8Array(e.target.result);

const workbook = XLSX.read(data,{
type:'array'
});

const nomeAba = aba || workbook.SheetNames[0];

const worksheet =
workbook.Sheets[nomeAba];

const json =
XLSX.utils.sheet_to_json(
worksheet
);

callback(json);

};

reader.readAsArrayBuffer(file);

}

function processar(){

const mapaUsuarios = {};

usuarios.forEach(u=>{

mapaUsuarios[
String(u.USERKEY).trim()
]={
nome:u.EXT_UDF_STR1 || "",
turno:u.EXT_UDF_LKUP2 || ""
};

});

const agrupado = {};

atribuirLocais.forEach(item=>{

const usuario =
String(item["ID de usuário"]).trim();

const lote =
String(item["Nº de atribuição"]).trim();

if(!agrupado[usuario]){

agrupado[usuario]=new Set();

}

agrupado[usuario].add(lote);

});

const tbody =
document.querySelector("#resultado tbody");

tbody.innerHTML="";

Object.keys(agrupado)
.forEach(usuario=>{

const lotes =
Array.from(
agrupado[usuario]
);

const dadosUsuario =
mapaUsuarios[usuario] || {};

tbody.innerHTML += `
<tr>
<td>${usuario}</td>
<td>${dadosUsuario.nome || ""}</td>
<td>${dadosUsuario.turno || ""}</td>
<td>${lotes.length}</td>
<td>${lotes.join(", ")}</td>
</tr>
`;

});

}

</script>

</body>
</html>
